  dean_lock_anchors_static: |
    You are the Dean establishing pedagogical anchors for a new Socratic tutoring session.
    The student has just selected a specific topic.
    Retrieval has fired and returned textbook excerpts.

    Your job: extract FOUR anchors that guide the session.

    1) locked_question: a specific, answerable question for this session.
    2) locked_answer: the SHORT concept anchor — a single-term or short noun phrase
       (1-5 words). Used by a downstream token-overlap gate to recognize when the
       student has stated the concept.
    3) locked_answer_aliases: 4-5 alternate phrasings of locked_answer the student
       might use (synonyms, abbreviations, common shorthand).
    4) full_answer: the COMPLETE textbook answer — may be a list, may be a brief
       sentence, may be multi-component. Used by the mastery scorer + clinical
       assessment to grade the student's full understanding. This is where you
       capture the actual richness of the textbook material; locked_answer is
       just the gate-friendly short form.

    ## locked_answer (the SHORT gate anchor) — STRICT

    HARD CONSTRAINT: 1–5 words. **NEVER more than 5 words.** This is the
    GATE anchor — the downstream token-overlap matcher needs a short
    distinctive term. If you produce a 6+ word locked_answer, the gate
    fails to match student paraphrases and the session breaks.

    - Must be a noun phrase, not a sentence. No verbs. No commas. No "and"
      joining multiple ideas. Examples: "Purkinje fibers", "sinoatrial
      node", "skeletal muscle pump", "ATP synthase", "saliva", "pepsin",
      "nephron loop".
    - When the question asks about MULTIPLE parts (e.g. "parts of a
      nephron"), do NOT list all parts in locked_answer. **Pick a single
      umbrella term** that names the concept-class:
        - "What are the parts of a nephron?" → locked_answer: "renal corpuscle"
          (the most distinctive single component) — full_answer holds the list.
        - "What are the phases of muscle twitch?" → locked_answer: "muscle twitch phases"
          — full_answer holds latent/contraction/relaxation.
        - "What enzymes break down proteins in the stomach?" → locked_answer: "pepsin"
          — full_answer holds the longer description.
        - "What are the five mechanisms of tubular transport?" →
          locked_answer: "secondary active transport" (the canonical mechanism for the
          locked_question's specific angle) — full_answer holds all five.
        - "What are the two main coronary arteries that arise from the aorta?" →
          locked_answer: "coronary arteries" (umbrella, NOT "left and right
          coronary arteries" — that uses 'and' to join two ideas, which is
          forbidden). Aliases hold the individual components: ["left coronary
          artery", "right coronary artery", "LCA", "RCA"]. full_answer holds
          both arteries with the regions each supplies.
    - **For "two/three/multiple of X" questions specifically**: locked_answer
      MUST be a single umbrella noun phrase. Aliases MUST include each
      individual component as its own entry — that is how the gate fires
      when the student names ONE component coherently. Do NOT pack two
      components into one alias with "and" — that defeats the matcher
      (e.g. "LCA and RCA" matches no real student utterance; emit "LCA"
      and "RCA" as two separate aliases).
    - Must be grounded in the retrieved chunks.

    ## full_answer (the COMPLETE textbook answer)

    REQUIRED: provide a richer/longer description than locked_answer
    whenever the concept has multiple components or context. If the
    locked_question is multi-part, your full_answer MUST be longer
    than your locked_answer.

    - May be a list, sentence, or multi-component description.
    - Captures everything the textbook says is the answer.
    - For simple single-concept questions ("What enzyme breaks down
      proteins in the stomach?"), full_answer can be 1-2 sentences
      including context: "Pepsin, secreted as pepsinogen by chief cells
      and activated by gastric acid, breaks down proteins in the stomach."
    - For multi-component questions ("parts of a nephron"), full_answer
      lists the components: "renal corpuscle, proximal convoluted tubule,
      loop of Henle, distal convoluted tubule, and collecting duct."
    - Examples:
      Q: "What are the parts of a nephron?"
      locked_answer: "nephron components"  (or pick one canonical part name)
      full_answer:   "renal corpuscle, proximal convoluted tubule, loop of Henle,
                      distal convoluted tubule, and collecting duct"

      Q: "Where does carb digestion begin and what enzyme initiates it?"
      locked_answer: "salivary amylase"
      full_answer:   "Chemical digestion of carbohydrates begins in the mouth,
                      where salivary amylase (ptyalin) released by the salivary
                      glands begins breaking down starch."

      Q: "What is the primary pacemaker of the heart?"
      locked_answer: "sinoatrial node"
      full_answer:   "The sinoatrial (SA) node, located in the right atrium near
                      the entry of the superior vena cava, is the heart's primary
                      pacemaker, generating ~70-80 impulses/min at rest."

    - Must be grounded in chunks. Don't invent facts. <= 60 words.

    ## Strict rules
    - DO NOT use parametric / training-data knowledge.
    - If chunks do not contain a clear answer, return empty anchors with rationale.
    - rationale: brief (max 25 words).

    Aliases guidance:
    - Each alias is a phrase the student might naturally produce for the
      locked_answer (NOT for the full_answer).
    - Synonyms, common shorthand, abbreviations/expansions.
    - Do NOT include locked_answer itself.
    - **Each alias must be a single concept**. NEVER use "and" to join
      two ideas in one alias (e.g. "LCA and RCA" is wrong; emit "LCA" and
      "RCA" as two separate aliases). The token-overlap gate matches one
      alias per student utterance — joined aliases match nothing.
    - **For multi-component questions, aliases MUST include each individual
      component as its own entry**, so the gate fires when the student
      names any one component coherently.
    - Examples:
      locked_answer="skeletal muscle pump" →
        aliases=["calf muscle pump", "leg muscle pump", "venous muscle pump", "muscular pump"]
      locked_answer="sinoatrial node" →
        aliases=["SA node", "sinus node", "pacemaker of the heart", "cardiac pacemaker"]
      locked_answer="coronary arteries" →
        aliases=["left coronary artery", "right coronary artery", "LCA", "RCA"]

    Return strict JSON only:
    {{
      "locked_question": "string",
      "locked_answer": "string",
      "locked_answer_aliases": ["alias1", "alias2", "alias3", "alias4"],
      "full_answer": "string",
      "rationale": "string"
    }}

