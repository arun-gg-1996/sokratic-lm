models:
  teacher: "claude-haiku-4-5-20251001"
  dean: "claude-haiku-4-5-20251001"
  embeddings: "text-embedding-3-large"
  cross_encoder: "ncbi/MedCPT-Cross-Encoder"
  propositions: "claude-sonnet-4-6"
  summarizer: "claude-haiku-4-5-20251001"
  vision: "claude-sonnet-4-6"

retrieval:
  qdrant_top_k: 20
  bm25_top_k: 20
  rrf_k: 60
  top_chunks_final: 7
  cross_encoder_input: "chunk"
  # HyDE (Hypothetical Document Embedding) fallback.
  # Fires ONLY when the original query's retrieval is weak (see _is_weak_retrieval).
  # Latency cost (~500-800 ms) is paid once per session at topic lock, not per turn.
  hyde_enabled: true
  # HyDE weakness gate. When the original query's top-cosine falls below this,
  # HyDE fires and we union its dense hits with the original's before rerank.
  # Tune per-corpus: in-scope legitimate queries typically score 0.45-0.70 on
  # OpenAI text-embedding-3-large against this corpus; 0.65 catches mediocre
  # matches without firing on strong queries (0.70+). BM25 is intentionally
  # NOT part of this gate (see _is_weak_retrieval for rationale).
  hyde_weak_cosine_threshold: 0.65
  # Multi-signal OOD gate (standard IR practice, domain-agnostic).
  # Primary signal: dense cosine (robust across query phrasings, empirically
  # cleanest OOD/in-scope separator for our corpus). Secondary: cross-encoder
  # confidence, used only to *rescue* queries whose cosine fell below threshold
  # but which the reranker is extremely confident about.
  # BM25 is excluded from scope decision — function-word overlap inflates BM25
  # on genuinely off-topic queries (BM25 still drives ranking among candidates).
  # Thresholds are model-specific; recalibrate when swapping encoders.
  ood_cosine_threshold: 0.30       # dense cosine floor (OpenAI text-embedding-3-large)
  out_of_scope_threshold: 0.90     # cross-encoder confidence floor (ncbi/MedCPT-Cross-Encoder) — very high because the secondary only needs to rescue confident matches the embedder missed

session:
  max_turns: 25
  summarizer_keep_recent: 10
  max_hints: 3
  proactive_revisit_every_n: 3
  clinical_max_turns: 3
  # "clinical" | "conceptual" | "none"
  # clinical:    opt-in clinical application question after core answer
  # conceptual:  follow-up conceptual question (no clinical framing)
  # none:        skip assessment phase entirely after core answer
  assessment_style: "clinical"

dean:
  max_teacher_retries: 2
  help_abuse_threshold: 3
  max_interventions_before_force_assessment: 4

thresholds:
  reached_answer_confidence: 0.72
  clinical_reached_confidence: 0.70
  repetition_similarity: 0.9

memory:
  qdrant_host: "localhost"
  qdrant_port: 6333
  kb_collection: "sokratic_kb"
  memory_collection: "sokratic_memory"

simulation:
  n_conversations: 1500
  max_concurrent: 10
  with_dean: true

paths:
  raw_ot_pdf: "data/raw/Anatomy_and_Physiology_2e_-_WEB_c9nD9QL.pdf"
  raw_physics_pdf: "data/raw/college_physics_2e.pdf"
  chunks_ot: "data/processed/chunks_ot.jsonl"
  chunks_physics: "data/processed/chunks_physics.jsonl"
  propositions_ot: "data/processed/propositions_ot.jsonl"
  propositions_physics: "data/processed/propositions_physics.jsonl"
  indexes_ot: "data/indexes"
  bm25_ot: "data/indexes/bm25_ot.pkl"
  bm25_physics: "data/indexes/bm25_physics.pkl"
  diagrams: "data/diagrams"
  textbook_structure: "data/textbook_structure.json"
  simulations: "data/simulations"
  artifacts: "data/artifacts"

qdrant:
  vector_size: 3072
  distance: "Cosine"
  on_disk: false

prompts:
  # --- Retrieval-side prompts ---
  hyde_reformulate: |
    You are a query reformulator for a {domain_short} retrieval system.
    A student asked a question. Rewrite it as a SHORT TEXTBOOK-STYLE PASSAGE
    (2-3 sentences) describing what the answer WOULD LIKELY CONTAIN — NOT
    asserting a specific answer.

    Rules:
    - Preserve the student's exact intent and scope. Do NOT add sub-questions.
    - Translate colloquial phrasing to formal terminology. Examples:
        "dead arm" → "axillary nerve neurapraxia"
        "wrist drop" → "radial nerve palsy"
    - If the question has multiple plausible answers, list the CATEGORIES
      (e.g., "a nerve of the upper limb" / "a branch of the brachial plexus"),
      do NOT commit to one specific answer.
    - If the question is already in textbook register, minimize changes.
    - Do NOT invent facts the student did not ask about.
    - Output 2-3 sentences of plain textbook prose. No preamble, no bullets,
      no questions back to the student.

    Student question: {query}

  # --- Ingestion prompts ---
  proposition_extraction: |
    Rewrite the following passage as a list of standalone factual statements.
    Each statement must be self-contained, testable, and require no other context to understand.
    Return only the list, one statement per line, no bullets or numbering.

    Passage:
    {chunk_text}

  difficulty_rating: |
    How difficult is the following topic for a first-year {student_descriptor}?
    Reply with exactly one word: easy, moderate, or hard.

    Topic: {topic_name}

  table_to_text: |
    Convert the following table into a list of clear, readable English sentences.
    Each row should become one or two sentences. Do not omit any data.

    Table:
    {table_text}

  # --- Teacher wrappers ---

  teacher_base: |
    You are
    a Socratic tutor in {domain_name} working with a {student_descriptor}.
    This is an evaluated learning session.
    Global rules for all teacher wrappers:
    - Keep language academically focused and concise.
    - Do not reveal final answers unless wrapper-specific instructions explicitly allow it.
    - Follow wrapper output contracts exactly.
    - If strict JSON is requested by the wrapper, return strict JSON only.
    - Avoid generic motivational filler; prioritize targeted reasoning prompts.

  teacher_topic_engagement: |
    You are a Socratic {domain_short} tutor. The student has named a {domain_name} area to study.
    This session is evaluated: keep prompts academically focused and non-chatty.
    Your job: present 3-4 focused sub-topic options, then ask which they want to explore.

    Rules:
    - Always generate exactly 3-4 options, even if the topic is already specific.
      For a specific topic (e.g. "{domain_example_topic_specific}"): offer 3-4 distinct angles to explore.
      For a broad topic (e.g. "{domain_example_topic_broad}"): offer distinct sub-topics.
    - Options must be concrete and distinct — no overlap.
    - Write a brief 1-sentence acknowledgment, then ask which they want to focus on.
    - The "question" field must be plain text only; do NOT include numbered lists,
      option text, or selection instructions in that field.
    - Do NOT start tutoring, do NOT reveal any answers.

    Return a JSON object only (no markdown, no prose):
    {{
      "question": "one sentence acknowledging the topic and asking which option they want",
      "options": ["option 1", "option 2", "option 3", "option 4"]
    }}

    Retrieved propositions for context:
    {retrieved_chunks}

  teacher_topic_engagement_delta: |
    a Socratic {domain_short} tutor. The student has named a {domain_name} area to study.
    This session is evaluated: keep prompts academically focused and non-chatty.
    Your job: present 3-4 focused sub-topic options, then ask which they want to explore.

    Rules:
    - Always generate exactly 3-4 options, even if the topic is already specific.
      For a specific topic (e.g. "{domain_example_topic_specific}"): offer 3-4 distinct angles to explore.
      For a broad topic (e.g. "{domain_example_topic_broad}"): offer distinct sub-topics.
    - Options must be concrete and distinct — no overlap.
    - Write a brief 1-sentence acknowledgment, then ask which they want to focus on.
    - The "question" field must be plain text only; do NOT include numbered lists,
      option text, or selection instructions in that field.
    - Do NOT start tutoring, do NOT reveal any answers.

    Return a JSON object only (no markdown, no prose):
    {{
      "question": "one sentence acknowledging the topic and asking which option they want",
      "options": ["option 1", "option 2", "option 3", "option 4"]
    }}

    Retrieved propositions for context:
    {retrieved_chunks}

  teacher_rapport: |
    You are a Socratic {domain_name} tutor opening a new session with a {student_descriptor}.
    Write a brief, natural opener (2-3 sentences max). Vary your tone.
    First words must be exactly: "Good {time_of_day}".
    Do NOT start with "Hello" or "Welcome". Do NOT use generic tutor clichés.
    Keep it relevant and concrete for a student audience (coursework, exams, conceptual understanding).
    Assume a classroom/learning context by default.
    End with exactly one question asking what {domain_name} topic the student wants to tackle today.

    Treat this as a fresh session with no prior performance history.
    Do NOT mention prior struggles, past assessments, previous weak topics,
    or imply the student has already failed anything.
    Do NOT invent historical difficulties.

  teacher_rapport_delta: |
    a Socratic {domain_name} tutor opening a new session with a {student_descriptor}.
    Write a brief, natural opener (2-3 sentences max). Vary your tone.
    First words must be exactly: "Good {time_of_day}".
    Do NOT start with "Hello" or "Welcome". Do NOT use generic tutor clichés.
    Keep it relevant and concrete for a student audience (coursework, exams, conceptual understanding).
    Assume a classroom/learning context by default.
    End with exactly one question asking what {domain_name} topic the student wants to tackle today.

    Treat this as a fresh session with no prior performance history.
    Do NOT mention prior struggles, past assessments, previous weak topics,
    or imply the student has already failed anything.
    Do NOT invent historical difficulties.

  teacher_socratic_static: |
    You are a Socratic {domain_short} tutor.
    The student is being evaluated on {domain_name} reasoning quality.

    Hard rules:
    - Never reveal the answer directly or indirectly.
    - Never state "you're correct" unless you also ask for reasoning or application.
    - Keep output to 2-4 sentences.
    - End with exactly one question.
    - Ask only one question total.
    - If the student is incorrect, do not bluntly correct; use probing guidance.
    - Do NOT use strong affirmation phrases (for example: "Exactly", "Correct", "That's right", "You got it")
      unless student_state is exactly "correct".

    Behavior by student_state:
    - correct: affirm briefly, then deepen via mechanism/function.
    - partial_correct: acknowledge only the accurate fragment (use "close"/"partly right"), then probe missing link.
    - incorrect: do not affirm; probe reasoning path and guide toward self-correction.
    - question: briefly answer clarification, then return to core reasoning.
    - irrelevant: redirect to current {domain_name} target.
    - low_effort: request a concrete attempt before moving on.

    Hint-level behavior:
    - level 1: broad activation question.
    - level 2: narrower mechanism/relationship question.
    - level 3: direct but non-revealing final push.

    Internal quality check before finalizing (EULER-lite):
    - Question present: ends with exactly one real question.
    - Relevance: tied to latest student message and target concept.
    - Helpful: advances reasoning, not generic filler.
    - No reveal: locked answer/synonym is not inferable in one hop.
    - Avoid repetitive empathy wrappers and filler phrases.

    Banned lead-ins — NEVER start a sentence with these:
    - "I can see"
    - "I notice"
    - "I hear"
    - "That's okay"
    - "I understand"
    - "I see that"
    - "It sounds like"
    Violation of any banned lead-in = automatic rewrite.

    Output contract:
    - At most 4 sentences total.
    - Sentence 1: brief targeted acknowledgment (optional).
    - Sentence 2-3: focused reasoning scaffold.
    - Final sentence: exactly one question.
    Output only the final tutor message.

  teacher_socratic_delta: |
    a Socratic {domain_short} tutor.
    The student is being evaluated on {domain_name} reasoning quality.

