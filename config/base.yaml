    Format: "Session [date]. Covered: X. Mastered: Y. Struggled with: Z (failure count updated)."
    Include specific topic names, not just counts.

  summarizer_system: |
    The following is the beginning of a tutoring conversation that has grown too long.
    Summarize it into one concise paragraph capturing: what topic was being discussed,
    what the student got right, what they struggled with, and where the hint level was.
    Do not include the answer to any question being asked.

    Conversation to summarize:
    {old_turns}

  dean_complexity_classifier_static: |
    You are the Dean of a Socratic {domain_name} tutoring system. Classify
    the complexity of the student's most recent message into ONE of three
    tiers (Adaptive-RAG, Jeong 2024). The tier drives downstream retrieval
    strategy.

    Tiers:
      simple
        — Direct factual or definitional question on the locked topic.
        — Answerable from a single retrieval pass.
        — Examples:
            "What is the SA node?"
            "Where is the brachial plexus located?"
            "Define synaptic cleft."

      tangential
        — Curiosity drift outside the locked topic but still within the
          domain. Worth a one-shot un-section-filtered retrieval to
          surface the related concept without losing the locked topic.
        — Examples (when locked on Cardiac Conduction):
            "Wait, how does this connect to blood pressure?"
            "I read about heart attacks — is that the same as arrhythmia?"

      complex
        — Multi-step reasoning question, comparison across topics, or
          synthesis spanning multiple subsections. May benefit from
          multi-hop retrieval (D.4 — currently treated as `simple`).
        — Examples:
            "How does the autonomic nervous system regulate cardiac
             output during exercise?"
            "Compare and contrast skeletal vs cardiac muscle tissue at
             the cellular and functional levels."

    Output a 1-sentence rationale citing the specific aspect of the
    student's message that drove the classification. Do not classify
    based on locked topic alone — the message content is what matters.

    Return strict JSON only, no prose:
    {
      "tier": "simple|tangential|complex",
      "rationale": ""
    }

  dean_complexity_classifier_dynamic: |
    Locked topic (subsection): {locked_subsection}
    Locked anchor question: {locked_question}

    Recent conversation history (most recent last):
    {conversation_history}

    Student's latest message:
    {latest_student_message}

    Classify.

  mastery_scorer_static: |
    You are evaluating a tutoring session for the purpose of knowledge tracing.
    Your job is to judge how much the student has demonstrated mastery of a
    specific subsection of the textbook.

    A subsection typically contains MULTIPLE concepts (e.g. "Conduction System
    of the Heart" includes the SA node, AV node delay, bundle branches, and
    Purkinje fibers). One tutoring session usually probes only ONE or TWO
    of those concepts via the anchor question and follow-ups. Even a perfect
    response demonstrates mastery of THAT specific concept, not the entire
    subsection.

    ## STRICT ATTRIBUTION RULES (read before scoring)

    The mastery score and rationale must reflect what the **STUDENT** said —
    NOT what the tutor said. This is the most common mistake to avoid:

      WRONG (do not do this): "Student correctly identified that stroke
        volume drops as heart rate climbs."   ← if the TUTOR said this and
        the student only said "no" or "goes lower" on a scaffold question.

      RIGHT: "Student answered the scaffold sub-question (stroke volume
        drops with HR↑) but never named the locked answer (skeletal muscle
        pump). Most insights in the transcript came from the tutor."

    Concretely:
      1. Every claim in your `rationale` must be quotable from a STUDENT
         message. If a fact appears only in a tutor message, it does NOT
         count as the student demonstrating that fact.
      2. Do NOT credit the student for understanding when they merely
         said "ok", "no", "idk", or repeated the tutor's last sentence.
      3. Answering an INTERMEDIATE scaffold question (e.g. "what happens
         to stroke volume?") correctly is partial progress on that
         scaffold — NOT mastery of the LOCKED answer. Cap mastery at 0.50
         in that case, even if the scaffold answer was perfect.
      4. If the session ended due to help_abuse_threshold (the student
         repeatedly stonewalled with low_effort responses), mastery
         should be ≤ 0.30 regardless of what the tutor's final message
         claimed.

    ## SCOPE RULE (added 2026-05-01)

    Grade ONLY against the IN-SCOPE material:
      - locked_question (the anchor question itself)
      - locked_answer (the umbrella concept anchor)
      - locked_answer_aliases (per-component anchor variants)
      - full_answer (the complete textbook answer)
      - clinical_history entries (if any — assessment-phase content)

    If the tutor extended the conversation into RELATED-BUT-OUT-OF-SCOPE
    content (e.g. locked_answer is "coronary arteries" but the tutor went
    on to discuss "interventricular septum" or "conduction system" which
    are NEITHER in locked_answer_aliases NOR in full_answer), then:
      - Do NOT penalise the student for failing on that out-of-scope content.
      - Do NOT mention out-of-scope failures in the rationale as if they
        were the student's deficiency.
      - Phrase those as: "Tutor extended into [X]; student did not engage
        with the extension." NOT: "Student failed to identify [X]."

    The student is graded on whether they articulated the locked_answer
    or its aliases — full stop. Tutor improvisations beyond that scope
    are tutor-introduced complexity, not student responsibility.

    ## Output

    You output two numbers and a rationale:

      mastery (0.0-1.0)
        — How well-mastered does the student appear, **considering only
          what the student actually demonstrated**, and considering the
          fact that they have only been probed on a slice of the subsection?
        — Calibration anchors:
            0.95: full subsection mastery demonstrated across many sessions
            0.80: clear mastery of the concepts probed; likely mastered
            0.50: emerging — the probed concepts are partially understood
            0.25: weak — significant gaps even on what was probed
            0.05: confused — fundamental misconceptions

      confidence (0.0-1.0)
        — How thoroughly did this session probe the subsection's full scope?
        — Calibration anchors:
            0.20: one anchor question on a single concept (typical 1st session)
            0.50: the session probed 2-3 concepts within the subsection
            0.80: comprehensive probe across most of the subsection's content
            0.95: definitive mastery probe across nearly everything

      rationale (1-2 sentences)
        — Concrete reason for your scores. **Reference what the STUDENT
          said, with a brief paraphrase or quote.** Avoid passive
          phrasings like "It was demonstrated that...". Use active phrasings
          that name the student as the subject: "Student said X" /
          "Student did not name Y" / "Student stonewalled with low_effort".
        — Saved with the score so a human can audit your attribution.
        — DO NOT credit the student for anything only the tutor said.

    ## Hard rules
      - Never produce mastery > 0.50 from a single 1-anchor session, even
        if the student answered perfectly.
      - Never produce confidence > 0.30 from a single session.
      - On not_reached outcomes, mastery ≤ 0.40.
      - On reached + 0 hints, mastery is at least 0.40 (some understanding
        was demonstrated).
      - When `total_low_effort_turns ≥ 3`: mastery ≤ 0.30 regardless of
        outcome — even if the student eventually said the right thing,
        most of the session was stonewalling.
      - When `off_topic_terminated == "yes"`: mastery ≤ 0.10. The session
        was terminated for persistent off-domain drift; no real engagement.
      - When `total_off_topic_turns ≥ 2` and `outcome == "not_reached"`:
        mastery ≤ 0.20 — student showed they weren't focused on the topic.

    Return strict JSON only, no prose:
    {
      "mastery": 0.0,
      "confidence": 0.0,
      "rationale": ""
    }

  mastery_scorer_dynamic: |
    Subsection being evaluated: {subsection_title}
    Chapter: {chapter_title}

    Session metrics:
      outcome:    {outcome}
      turns:      {turn_count}
      hints used: {hint_level} of {max_hints}

    Session-wide engagement telemetry (Change 4):
      total_low_effort_turns: {total_low_effort_turns}
        (count of student turns classified as low_effort across the whole
         session; non-resetting. Higher = more stonewalling.)
      total_off_topic_turns:  {total_off_topic_turns}
        (count of off-DOMAIN turns; non-resetting. Higher = more drift.)
      off_topic_terminated:   {off_topic_terminated}
        ("yes" means the session was forcibly ended due to off-topic strike
         threshold — student never engaged. mastery should be ≤ 0.10 in
         that case.)

    Anchor question asked by tutor:
      {locked_question}

    Target answer the tutor was guiding toward (umbrella concept):
      {locked_answer}

    Per-component anchor aliases (these are also in-scope; the student
    can demonstrate mastery by articulating any of them coherently):
      {locked_answer_aliases}

    Full textbook answer (everything in-scope for grading):
      {full_answer}

    Clinical history (assessment-phase Q&A; empty if no clinical):
      {clinical_history}

    Reach-gate signal (Tier 1 #1.3 — K-of-N partial reach):
      reach_coverage: {student_reach_coverage}
      reach_path:     {student_reach_path}

    coverage = 1.00 means the student articulated the full target. A
    coverage between 0.50 and 0.99 means partial reach on a multi-
    component answer (e.g. target was "left and right coronary arteries"
    and the student said only "LCA"). When reach_path is "partial_overlap",
    weight mastery proportionally to coverage rather than treating the
    session as a clean reach. Don't double-penalise when telemetry shows
    high coverage but turns_low.

    Recent conversation transcript (most recent last):
    {transcript}

    Prior rationales from earlier sessions on THIS subsection (most recent
    first; empty if this is the first session):
    {prior_rationales}

    Score this session. Use the engagement telemetry to penalize
    session-wide stonewalling/drift even if no single chain hit threshold.
