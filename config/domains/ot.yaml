domain:
  name: "human anatomy"
  short: "anatomy"
  student_descriptor: "student"
  kb_collection: "sokratic_kb"
  memory_collection: "sokratic_memory"
  mem0_namespace: "anatomy"
  # 2026-04-28: switched from "ot" to "openstax_anatomy" after the v1
  # pipeline rebuild. This name now matches the textbook_id used at index
  # time (sources/openstax_anatomy/) and the artifact filenames
  # (chunks_openstax_anatomy.jsonl, bm25_openstax_anatomy.pkl). The Qdrant
  # filter and BM25 path lookup both key off this string. The ontology
  # adapter recognizes both "ot" and "openstax_anatomy" → UMLSAdapter.
  retrieval_domain: "openstax_anatomy"

  # Used as concrete examples in prompts so the LLM understands the expected format
  example_topic_specific: "axillary nerve"
  example_topic_broad: "brachial plexus"
  example_question: "What does the suprascapular nerve supply?"
  example_answer: "axillary nerve"
  example_answer_format: "structure name only (e.g. 'axillary nerve', 'deltoid muscle')"

  # Terms so generic they should not be accepted as locked topics without a sub-focus
  generic_topic_terms:
    - anatomy
    - ot
    - study
    - topic
    - bone
    - bones
    - joint
    - joints
    - muscle
    - muscles
    - nerve
    - nerves
    - upper limb
    - lower limb
    - shoulder
    - arm
    - hand
    - leg
    - region
    - system
    - body

  # Drives post-answer assessment framing
  assessment_dimension: "clinical application"
  assessment_dimension_examples: "exam findings, function, or intervention planning"

# Topic-index (TOC-grounded topic menu) configuration.
# Mechanism: scripts/build_topic_index.py walks textbook_structure.json,
# drops junk nodes matching any pattern below, and enriches remaining nodes
# with chunk_count from the indexed corpus. Output: data/topic_index.json.
topic_index:
  min_chunk_count: 1          # keep nodes with >= N chunks
  limited_chunk_threshold: 2  # tag "limited coverage" when chunk_count <= N
  # Substring matches (case-insensitive) that disqualify a node's name.
  # Anatomy-specific: OpenStax A&P callout boxes are not teachable topics.
  junk_patterns:
    - "INTERACTIVE LINK"
    - "CAREER CONNECTION"
    - "Everyday Connection"
    - "HOMEOSTATIC IMBALANCES"
    - "DISORDERS OF THE"
    - "AGING AND THE"
    - "INDEX"
  # Trailing ellipsis indicates a truncated/unparseable heading.
  junk_suffixes:
    - "..."

# Domain-specific query alias expansions for retrieval.
# Mechanism lives in retrieval/retriever.py (`_apply_query_aliases`) and is
# domain-agnostic — only the mappings below are domain-specific. Expansion is
# additive: the student's original tokens are preserved, alias text appended,
# so BM25 and dense retrieval see both forms.
query_aliases:
  # --- Cranial-nerve Roman-numeral shorthand students type ---
  "cn i":    "olfactory nerve"
  "cn ii":   "optic nerve"
  "cn iii":  "oculomotor nerve"
  "cn iv":   "trochlear nerve"
  "cn v":    "trigeminal nerve"
  "cn vi":   "abducens nerve"
  "cn vii":  "facial nerve"
  "cn viii": "vestibulocochlear nerve"
  "cn ix":   "glossopharyngeal nerve"
  "cn x":    "vagus nerve"
  "cn xi":   "accessory nerve"
  "cn xii":  "hypoglossal nerve"

  # --- Clinical nerve-injury syndromes → anatomical cause ---
  "wrist drop":        "radial nerve palsy spiral groove"
  "dead arm":          "axillary nerve neurapraxia shoulder dislocation"
  "claw hand":         "ulnar nerve palsy"
  "ape hand":          "median nerve palsy thenar atrophy"
  "foot drop":         "common peroneal nerve palsy"
  "saturday night palsy": "radial nerve compression humerus"

  # --- OT-specific physical exam tests ---
  "empty can test":    "supraspinatus jobe test shoulder abduction"
  "full can test":     "supraspinatus shoulder abduction external rotation"
  "hawkins kennedy test": "subacromial impingement supraspinatus"
  "neer test":         "subacromial impingement supraspinatus rotator cuff"
  "phalen test":       "median nerve carpal tunnel wrist flexion"
  "tinel sign":        "nerve percussion regeneration"
  "finkelstein test":  "de quervain tenosynovitis abductor pollicis longus"
  "froment sign":      "ulnar nerve adductor pollicis thumb"

  # --- Arterial / cardiac abbreviations ---
  "lad":   "left anterior descending artery"
  "rca":   "right coronary artery"
  "lcx":   "left circumflex artery"

  # --- Ligament abbreviations ---
  "acl":   "anterior cruciate ligament"
  "pcl":   "posterior cruciate ligament"
  "mcl":   "medial collateral ligament"
  "lcl":   "lateral collateral ligament"

  # --- Informal clinical shorthand ---
  "tennis elbow":      "lateral epicondylitis extensor carpi radialis brevis"
  "golfers elbow":     "medial epicondylitis flexor pronator"
  "frozen shoulder":   "adhesive capsulitis glenohumeral"
  "trigger finger":    "stenosing tenosynovitis flexor tendon"
