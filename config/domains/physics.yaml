domain:
  name: "physics"
  short: "physics"
  student_descriptor: "student"
  kb_collection: "sokratic_physics_kb"
  memory_collection: "sokratic_physics_memory"
  mem0_namespace: "physics"
  retrieval_domain: "physics"

  # Used as concrete examples in prompts so the LLM understands the expected format
  example_topic_specific: "Newton's third law"
  example_topic_broad: "classical mechanics"
  example_question: "What is the relationship between force and acceleration?"
  example_answer: "Newton's third law"
  example_answer_format: "law name, quantity, or principle (e.g. 'Newton's third law', 'conservation of momentum')"

  # Terms so generic they should not be accepted as locked topics without a sub-focus
  generic_topic_terms:
    - physics
    - study
    - topic
    - force
    - forces
    - energy
    - motion
    - wave
    - waves
    - field
    - fields
    - law
    - laws
    - principle
    - principles
    - mechanics
    - electricity
    - magnetism
    - optics
    - thermodynamics

  # Drives post-answer assessment framing
  assessment_dimension: "real-world application"
  assessment_dimension_examples: "problem-solving, physical phenomena, or engineering context"

  # ─── L78 / L9 / L77 / L74 / L19 — per-domain config slots ────────────────
  # Curated abbreviation list (per L9). Physics seed list — extend as needed.
  curated_abbrevs_path: "data/curated_abbrevs_physics.json"

  # VLM (image upload) — DISABLED for physics (per user, 2026-05-02).
  # Frontend hides the upload button; backend rejects image upload requests.
  vlm:
    enabled: false

  # Clinical scenario framing (per L74 / L78). Physics gets engineering /
  # apparatus framing rather than patient-case framing.
  clinical_scenario_style: "engineering problem, lab apparatus, or measurement scenario with a quantitative question"

  # Display-label rewrite tone (per L19 / L78).
  display_label_style: "concise student-friendly physics phrasing"
